<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head('Pending Employees')"></head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <h2 class="mb-4">Pending Employees</h2>

    <table class="table table-striped table-hover">

        <thead class="table-dark">
        <tr>
            <th>Username</th>
            <th>Office</th>
            <th>Position</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="u : ${users}">

            <form method="post" action="/admin/approve">

                <td th:text="${u.username}"></td>

                <td>
                    <select name="officeId" class="form-select">
                        <option th:each="o : ${offices}"
                                th:value="${o.id}"
                                th:text="${o.city + ' - ' + o.address}">
                        </option>
                    </select>
                </td>

                <td>
                    <select name="position" class="form-select">
                        <option value="COURIER">Courier</option>
                        <option value="OFFICE">Office</option>
                    </select>
                </td>

                <td>
                    <input type="hidden" name="userId" th:value="${u.id}"/>
                    <button type="submit" class="btn btn-success">
                        Approve
                    </button>
                </td>

            </form>

        </tr>

        </tbody>

    </table>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
