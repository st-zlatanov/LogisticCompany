</html><!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head('Edit Employee')"></head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <h2 class="page-title mb-4">Edit Employee</h2>

    <div class="card p-4">

        <form th:action="@{/employees/update/{id}(id=${employee.id})}"
              method="post">

            <div class="row g-3">

                <div class="col-md-6">

                    <label class="form-label">Position</label>

                    <select class="form-select" name="position">

                        <option th:each="p : ${positions}"
                                th:value="${p}"
                                th:text="${p}"
                                th:selected="${employee.position == p}">
                        </option>

                    </select>

                </div>

                <div class="col-md-6">

                    <label class="form-label">Office</label>

                    <select class="form-select" name="officeId">

                        <option th:each="o : ${offices}"
                                th:value="${o.id}"
                                th:text="${o.city + ' - ' + o.address}"
                                th:selected="${employee.office.id == o.id}">
                        </option>

                    </select>

                </div>

            </div>

            <div class="mt-4">

                <button class="btn btn-success">
                    Save Changes
                </button>

                <a href="/employees" class="btn btn-secondary">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
