<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head('Track Shipment')"></head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <h2 class="page-title text-center mb-4">
        Shipment Tracking
    </h2>

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card p-4">

                <h4 class="text-center mb-3">
                    Tracking #
                    <span class="badge bg-dark"
                          th:text="${shipment.trackingNumber}">
                    </span>
                </h4>

                <hr>

                <p>
                    <strong>Status:</strong>

                    <span th:if="${shipment.status.name() == 'SENT'}"
                          class="badge bg-warning text-dark">
                        Sent
                    </span>

                    <span th:if="${shipment.status.name() == 'DELIVERED'}"
                          class="badge bg-success">
                        Delivered
                    </span>

                </p>

                <p>
                    <strong>Sender:</strong>
                    <span th:text="${shipment.sender.user.fullName}"></span>
                </p>

                <p>
                    <strong>Receiver:</strong>
                    <span th:text="${shipment.receiver.user.fullName}"></span>
                </p>

                <p>
                    <strong>Weight:</strong>
                    <span th:text="${shipment.weight}"></span> kg
                </p>

                <p>
                    <strong>Price:</strong>
                    <span th:text="${shipment.price}"></span> €
                </p>

                <p>
                    <strong>Delivery Type:</strong>
                    <span th:text="${shipment.deliveryType}"></span>
                </p>

                <p th:if="${shipment.deliveryType.name() == 'OFFICE'}">
                    <strong>Delivery Office:</strong>
                    <span th:text="${shipment.destinationOffice.city + ' - ' + shipment.destinationOffice.address}">
                    </span>
                </p>

                <p th:if="${shipment.deliveryType.name() == 'ADDRESS'}">
                    <strong>Delivery Address:</strong>
                    <span th:text="${shipment.deliveryAddress}">
                    </span>
                </p>

                <p>
                    <strong>Created:</strong>
                    <span th:text="${#temporals.format(shipment.dateCreated,'yyyy-MM-dd HH:mm')}"></span>
                </p>

                <hr>

                <!-- TIMELINE TRACKER -->

                <div class="tracker mt-4">

                    <div class="step active">
                        <div class="circle"></div>
                        <div class="label">Created</div>
                    </div>

                    <div class="step"
                         th:classappend="${shipment.status.name() == 'SENT' || shipment.status.name() == 'DELIVERED'} ? 'active'">

                        <div class="circle"></div>
                        <div class="label">Sent</div>

                    </div>

                    <div class="step"
                         th:classappend="${shipment.status.name() == 'DELIVERED'} ? 'active'">

                        <div class="circle"></div>
                        <div class="label">Delivered</div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>


<style>

    .tracker{
    display:flex;
    justify-content:space-between;
    position:relative;
    margin-top:30px;
    }

    .tracker::before{
    content:'';
    position:absolute;
    top:12px;
    left:0;
    right:0;
    height:4px;
    background:#ddd;
    z-index:0;
    }

    .step{
    text-align:center;
    position:relative;
    z-index:1;
    }

    .circle{
    width:25px;
    height:25px;
    border-radius:50%;
    background:#bbb;
    margin:auto;
    }

    .step.active .circle{
    background:#28a745;
    }

    .label{
    margin-top:5px;
    font-size:14px;
    }

</style>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
