<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head('Shipments')"></head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="page-title mb-0">Shipments</h2>

        <a href="/shipments/create" class="btn btn-success">
            Create Shipment
        </a>
    </div>

    <div class="card p-3 mb-4">
        <form method="get" action="/shipments" class="row g-3">

            <div class="col-md-4">
                <input type="text"
                       name="search"
                       th:value="${param.search}"
                       class="form-control"
                       placeholder="Search by sender or receiver">
            </div>

            <div class="col-md-3">
                <select name="status" class="form-select">

                    <option value="">All Statuses</option>

                    <option value="SENT"
                            th:selected="${param.status == 'SENT'}">
                        Sent
                    </option>

                    <option value="DELIVERED"
                            th:selected="${param.status == 'DELIVERED'}">
                        Delivered
                    </option>

                </select>
            </div>

            <div class="col-md-2">
                <button class="btn btn-primary w-100">
                    Filter
                </button>
            </div>

        </form>
    </div>

    <div class="card">
        <div class="table-responsive">

            <table class="table table-hover align-middle mb-0">

                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Sender</th>
                    <th>Receiver</th>
                    <th>Status</th>
                    <th>Date</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="s : ${shipments}">

                    <td>
                        <a th:href="@{/shipments/{id}(id=${s.id})}"
                           th:text="${s.id}">
                        </a>
                    </td>

                    <td th:text="${s.sender.user.fullName}"></td>

                    <td th:text="${s.receiver.user.fullName}"></td>

                    <td>

<span th:if="${s.status.name() == 'SENT'}"
      class="badge bg-warning text-dark">
Sent
</span>

                        <span th:if="${s.status.name() == 'DELIVERED'}"
                              class="badge bg-success">
Delivered
</span>

                    </td>

                    <td th:text="${#temporals.format(s.dateCreated,'yyyy-MM-dd HH:mm')}"></td>

                </tr>

                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
