<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head('Edit Client')"></head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <h2>Edit Client</h2>

    <div class="card p-4">

        <form th:action="@{/clients/edit/{id}(id=${client.id})}"
              th:object="${client}"
              method="post">

            <div class="mb-3">

                <label>Name</label>

                <input type="text"
                       th:field="*{name}"
                       class="form-control">

            </div>

            <div class="mb-3">

                <label>Address</label>

                <input type="text"
                       th:field="*{address}"
                       class="form-control">

            </div>

            <div class="mb-3">

                <label>Phone</label>

                <input type="text"
                       th:field="*{phone}"
                       class="form-control">

            </div>

            <button class="btn btn-success">
                Update Client
            </button>

            <a href="/clients" class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
