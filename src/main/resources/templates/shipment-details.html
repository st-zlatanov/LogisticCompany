<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head('Shipment Details')"></head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <h2 class="page-title">
        Shipment Details
    </h2>

    <div class="card p-4">


        <div class="row mb-3">

            <div class="col-md-4">
                <strong>ID:</strong>
                <span th:text="${shipment.id}"></span>
            </div>

            <div class="col-md-4">
                <strong>Tracking Number:</strong>
                <span class="badge bg-dark"
                      th:text="${shipment.trackingNumber}">
                </span>
            </div>

            <div class="col-md-4">
                <strong>Status:</strong>

                <span th:if="${shipment.status.name() == 'SENT'}"
                      class="badge bg-warning text-dark">
                    Sent
                </span>

                <span th:if="${shipment.status.name() == 'DELIVERED'}"
                      class="badge bg-success">
                    Delivered
                </span>

            </div>

        </div>


        <div class="row mb-3">

            <div class="col-md-6">
                <strong>Sender:</strong>
                <span th:text="${shipment.sender.user.fullName}"></span>
            </div>

            <div class="col-md-6">
                <strong>Receiver:</strong>
                <span th:text="${shipment.receiver.user.fullName}"></span>
            </div>

        </div>

        <div class="row mb-3">

            <div class="col-md-6">
                <strong>Weight:</strong>
                <span th:text="${shipment.weight}"></span> kg
            </div>

            <div class="col-md-6">
                <strong>Price:</strong>
                <span th:text="${shipment.price}"></span> €
            </div>

        </div>


        <div class="row mb-3">

            <div class="col-md-6">
                <strong>Delivery Type:</strong>
                <span th:text="${shipment.deliveryType}"></span>
            </div>

            <div class="col-md-6">
                <strong>Date Created:</strong>
                <span th:text="${#temporals.format(shipment.dateCreated,'yyyy-MM-dd HH:mm')}"></span>
            </div>

        </div>


        <div class="row mb-3">


            <div class="col-md-6"
                 th:if="${shipment.deliveryType.name() == 'OFFICE'}">

                <strong>Delivery Office:</strong>

                <span class="badge bg-secondary"
                      th:text="${shipment.destinationOffice.city + ' - ' + shipment.destinationOffice.address}">
                </span>
        </span>

            </div>


            <div class="col-md-6"
                 th:if="${shipment.deliveryType.name() == 'ADDRESS'}">

                <strong>Delivery Address:</strong>

                <span th:text="${shipment.deliveryAddress}">
        </span>

            </div>

        </div>

        <div class="mt-3">

            <form th:if="${shipment.status.name() == 'SENT'}"
                  th:action="@{/shipments/deliver/{id}(id=${shipment.id})}"
                  method="post">

                <button class="btn btn-success">
                    Mark as Delivered
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
