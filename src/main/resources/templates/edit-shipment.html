<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head('Edit Shipment')"></head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <h2 class="page-title">Edit Shipment</h2>

    <div class="card p-4">

        <form th:action="@{/shipments/edit/{id}(id=${id})}"
              th:object="${shipment}"
              method="post">

            <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger">
                <p th:each="err : ${#fields.errors('*')}" th:text="${err}"></p>
            </div>

            <div class="row mb-3">

                <div class="col-md-6">

                    <label>Sender</label>

                    <select th:field="*{senderId}" class="form-select">

                        <option value="">Select Sender</option>

                        <option th:each="c : ${clients}"
                                th:value="${c.id}"
                                th:text="${c.user.fullName}">
                        </option>

                    </select>

                </div>

                <div class="col-md-6">

                    <label>Receiver</label>

                    <select th:field="*{receiverId}" class="form-select">

                        <option value="">Select Receiver</option>

                        <option th:each="c : ${clients}"
                                th:value="${c.id}"
                                th:text="${c.user.fullName}">
                        </option>

                    </select>

                </div>

            </div>


            <div class="row mb-3">

                <div class="col-md-6">

                    <label>Source Office</label>

                    <select th:field="*{sourceOfficeId}" class="form-select">

                        <option value="">Select Office</option>

                        <option th:each="o : ${offices}"
                                th:value="${o.id}"
                                th:text="${o.city + ' - ' + o.address}">
                        </option>

                    </select>

                </div>

                <div class="col-md-6">

                    <label>Weight (kg)</label>

                    <input type="number"
                           step="0.1"
                           th:field="*{weight}"
                           class="form-control">

                </div>

            </div>


            <div class="row mb-3">

                <div class="col-md-6">

                    <label>Delivery Type</label>

                    <select th:field="*{deliveryType}"
                            class="form-select"
                            id="deliveryType">

                        <option value="">Select Type</option>
                        <option value="OFFICE">To Office</option>
                        <option value="ADDRESS">To Address</option>

                    </select>

                </div>

            </div>


            <div class="mb-3" id="destinationOfficeBlock">

                <label>Destination Office</label>

                <select th:field="*{destinationOfficeId}" class="form-select">

                    <option value="">Select Office</option>

                    <option th:each="o : ${offices}"
                            th:value="${o.id}"
                            th:text="${o.city + ' - ' + o.address}">
                    </option>

                </select>

            </div>


            <div class="mb-3" id="deliveryAddressBlock">

                <label>Delivery Address</label>

                <input type="text"
                       th:field="*{deliveryAddress}"
                       class="form-control">

            </div>


            <div class="mb-3">

                <label>Description</label>

                <textarea th:field="*{description}"
                          class="form-control"></textarea>

            </div>


            <button type="submit" class="btn btn-success">
                Update Shipment
            </button>

            <a href="/shipments" class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>

    function toggleDeliveryFields(){

    let type = document.getElementById("deliveryType").value;

    let officeBlock = document.getElementById("destinationOfficeBlock");
    let addressBlock = document.getElementById("deliveryAddressBlock");

    if(type === "OFFICE"){

    officeBlock.style.display = "block";
    addressBlock.style.display = "none";

    }

    else if(type === "ADDRESS"){

    officeBlock.style.display = "none";
    addressBlock.style.display = "block";

    }

    else{

    officeBlock.style.display = "none";
    addressBlock.style.display = "none";

    }

    }

    document.getElementById("deliveryType").addEventListener("change", toggleDeliveryFields);

    window.onload = toggleDeliveryFields;

</script>

</body>
</html>
