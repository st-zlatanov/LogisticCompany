<!DOCTYPE html>

    <link rel="stylesheet" href="/css/style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"

</head>

<body>

        <a class="navbar-brand" href="/">Logistic</a>

        <div class="navbar-nav">

        </div>
