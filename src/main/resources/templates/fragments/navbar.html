<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand" href="/">LogisticSystem</a>

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>

                <li class="nav-item"
                    sec:authorize="hasAnyRole('ADMIN','EMPLOYEE')">

                    <a class="nav-link" href="/shipments">
                        Shipments
                    </a>

                </li>

                <li class="nav-item"
                    sec:authorize="hasAnyRole('ADMIN','EMPLOYEE')">

                    <a class="nav-link" href="/offices">
                        Offices
                    </a>

                </li>

                <li class="nav-item"
                    sec:authorize="hasAnyRole('ADMIN','EMPLOYEE')">

                    <a class="nav-link" href="/clients">
                        Clients
                    </a>

                </li>

                <li class="nav-item"
                    sec:authorize="hasRole('ADMIN')">

                    <a class="nav-link" href="/employees">
                        Employees
                    </a>

                </li>


                <li class="nav-item"
                    sec:authorize="hasRole('ADMIN')">

                    <a class="nav-link" href="/admin/users">
                        User Control
                    </a>

                </li>

                <li class="nav-item"
                    sec:authorize="hasRole('ADMIN')">

                    <a class="nav-link" href="/admin/pending-employees">
                        Pending Employees
                    </a>

                </li>

                <li class="nav-item"
                    sec:authorize="hasRole('CLIENT')">

                    <a class="nav-link" href="/shipments/my">
                        My Shipments
                    </a>

                </li>

            </ul>

            <ul class="navbar-nav">

                <li class="nav-item"
                    sec:authorize="!isAuthenticated()">

                    <a class="nav-link" href="/login">Login</a>

                </li>

                <li class="nav-item"
                    sec:authorize="!isAuthenticated()">

                    <a class="nav-link" href="/register">Register</a>

                </li>

                <!-- logged user -->

                <li class="nav-item"
                    sec:authorize="isAuthenticated()">

                    <form method="post" action="/logout">

                        <button class="btn btn-outline-light btn-sm">
                            Logout
                        </button>

                    </form>

                </li>

            </ul>

        </div>

    </div>

</nav>
</html>
