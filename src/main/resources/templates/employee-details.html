<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head('Employee Details')"></head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <h2 class="page-title mb-4">Employee Details</h2>

    <div class="card p-4 mb-4">

        <div class="row">

            <div class="col-md-4">
                <strong>Name:</strong>
                <span th:text="${employee.user.fullName}"></span>
            </div>

            <div class="col-md-4">
                <strong>Position:</strong>
                <span th:text="${employee.position}"></span>
            </div>

            <div class="col-md-4">
                <strong>Office:</strong>
                <span th:text="${employee.office.city + ' - ' + employee.office.address}"></span>
            </div>

        </div>

    </div>


    <h4 class="mb-3">Registered Shipments</h4>

    <div class="card">

        <div class="table-responsive">

            <table class="table table-hover align-middle mb-0">

                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Sender</th>
                    <th>Receiver</th>
                    <th>Status</th>
                    <th>Date</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="s : ${shipments}">

                    <td>
                        <a th:href="@{/shipments/{id}(id=${s.id})}"
                           th:text="${s.id}">
                        </a>
                    </td>

                    <td th:text="${s.sender.user.fullName}"></td>

                    <td th:text="${s.receiver.user.fullName}"></td>

                    <td>

<span th:if="${s.status.name() == 'SENT'}"
      class="badge bg-warning text-dark">
Sent
</span>

                        <span th:if="${s.status.name() == 'DELIVERED'}"
                              class="badge bg-success">
Delivered
</span>

                    </td>

                    <td th:text="${#temporals.format(s.dateCreated,'yyyy-MM-dd HH:mm')}"></td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
