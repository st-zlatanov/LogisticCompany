<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head('Offices')"></head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-3">

        <h2 class="page-title mb-3 mb-md-0">Offices</h2>

        <a href="/offices/create" class="btn btn-success">
            Create Office
        </a>

    </div>

    <div class="card shadow-sm">

        <div class="table-responsive">

            <table class="table table-hover align-middle mb-0">

                <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>City</th>
                    <th>Address</th>
                    <th>Actions</th>
                </tr>

                </thead>

                <tbody>

                <tr th:each="o : ${offices}">

                    <td th:text="${o.id}"></td>

                    <td>
                        <span class="fw-semibold" th:text="${o.city}"></span>
                    </td>

                    <td th:text="${o.address}"></td>

                    <td>

                        <div class="d-flex gap-2 flex-wrap">

                            <a th:href="@{/offices/edit/{id}(id=${o.id})}"
                               class="btn btn-sm btn-primary">
                                Edit
                            </a>

                            <form th:action="@{/offices/delete/{id}(id=${o.id})}"
                                  method="post">

                                <button class="btn btn-sm btn-danger"
                                        onclick="return confirm('Delete this office?')">
                                    Delete
                                </button>

                            </form>

                        </div>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
