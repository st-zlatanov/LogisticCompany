<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head('Clients')"></head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-3">

        <h2 class="page-title mb-3 mb-md-0">Clients</h2>

        <a href="/clients/create" class="btn btn-success">
            Create Client
        </a>

    </div>

    <div class="card shadow-sm">

        <div class="table-responsive">

            <table class="table table-hover align-middle mb-0">

                <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Address</th>
                    <th>Phone</th>
                    <th>Actions</th>
                </tr>

                </thead>

                <tbody>

                <tr th:each="c : ${clients}">

                    <td th:text="${c.id}"></td>

                    <td th:text="${c.name}"></td>

                    <td th:text="${c.address}"></td>

                    <td th:text="${c.phone}"></td>

                    <td>

                        <div class="d-flex gap-2 flex-wrap">

                            <a th:href="@{/clients/{id}(id=${c.id})}"
                               class="btn btn-sm btn-secondary">
                                Details
                            </a>

                            <a th:href="@{/clients/edit/{id}(id=${c.id})}"
                               class="btn btn-sm btn-primary">
                                Edit
                            </a>

                            <form th:action="@{/clients/delete/{id}(id=${c.id})}"
                                  method="post">

                                <button class="btn btn-sm btn-danger">
                                    Delete
                                </button>

                            </form>

                        </div>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
