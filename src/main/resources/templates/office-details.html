<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head('Office Details')"></head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <h2 class="page-title">Office Details</h2>

    <div class="card p-4 mb-4">

        <div class="row">

            <div class="col-md-4">
                <strong>ID:</strong>
                <span th:text="${office.id}"></span>
            </div>

            <div class="col-md-4">
                <strong>City:</strong>
                <span th:text="${office.city}"></span>
            </div>

            <div class="col-md-4">
                <strong>Address:</strong>
                <span th:text="${office.address}"></span>
            </div>

        </div>

    </div>



    <h4 class="mb-3">Employees</h4>

    <div class="card mb-4">

        <div class="table-responsive">

            <table class="table table-hover mb-0">

                <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Position</th>
                </tr>

                </thead>

                <tbody>

                <tr th:each="e : ${employees}">

                    <td th:text="${e.id}"></td>

                    <td th:text="${e.user.fullName}"></td>

                    <td th:text="${e.position}"></td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>



    <h4 class="mb-3">Shipments From This Office</h4>

    <div class="card mb-4">

        <div class="table-responsive">

            <table class="table table-hover mb-0">

                <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>Tracking</th>
                    <th>Receiver</th>
                    <th>Status</th>
                </tr>

                </thead>

                <tbody>

                <tr th:each="s : ${sentShipments}">

                    <td th:text="${s.id}"></td>

                    <td th:text="${s.trackingNumber}"></td>

                    <td th:text="${s.receiver.name}"></td>

                    <td>

<span th:if="${s.status.name() == 'SENT'}"
      class="badge bg-warning text-dark">
Sent
</span>

                        <span th:if="${s.status.name() == 'DELIVERED'}"
                              class="badge bg-success">
Delivered
</span>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>



    <h4 class="mb-3">Shipments To This Office</h4>

    <div class="card">

        <div class="table-responsive">

            <table class="table table-hover mb-0">

                <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>Tracking</th>
                    <th>Sender</th>
                    <th>Status</th>
                </tr>

                </thead>

                <tbody>

                <tr th:each="s : ${receivedShipments}">

                    <td th:text="${s.id}"></td>

                    <td th:text="${s.trackingNumber}"></td>

                    <td th:text="${s.sender.name}"></td>

                    <td>

<span th:if="${s.status.name() == 'SENT'}"
      class="badge bg-warning text-dark">
Sent
</span>

                        <span th:if="${s.status.name() == 'DELIVERED'}"
                              class="badge bg-success">
Delivered
</span>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
